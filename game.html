<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 移动端核心视口配置，移动UI作业必加 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>移动端小游戏｜移动UI期末作业</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      min-height: 100vh;
      overflow-x: hidden;
      color: #fff;
    }
    /* 页面容器，单页切换 */
    .page {
      display: none;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .page.active {
      display: block;
    }
    /* 移动端卡片UI */
    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 30px 24px;
      margin-top: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 12px;
      font-weight: 600;
    }
    .desc {
      text-align: center;
      opacity: 0.9;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    /* 移动端触摸按钮样式（大尺寸适合手指点击） */
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 14px;
      transition: 0.2s all;
    }
    .btn-primary {
      background: #fff;
      color: #6366f1;
    }
    .btn-primary:active {
      transform: scale(0.96);
      opacity: 0.9;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid #fff;
      color: #fff;
    }
    /* 移动端输入框 */
    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: none;
      font-size: 17px;
      margin-top: 10px;
      outline: none;
    }
    input::placeholder {
      color: #aaa;
    }
    /* 提示弹窗UI */
    .tip-box {
      text-align: center;
      font-size: 18px;
      margin: 20px 0;
      min-height: 26px;
    }
    /* 游戏数据面板 */
    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      font-size: 16px;
    }
    /* 结算弹窗 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      width: 100%;
      max-width: 360px;
      background: white;
      color: #333;
      border-radius: 24px;
      padding: 36px 24px;
      text-align: center;
    }
    .modal-content h2 {
      color: #6366f1;
      margin-bottom: 16px;
    }
    .modal-content p {
      color: #666;
      margin-bottom: 24px;
      line-height: 1.7;
    }
    .modal-btn {
      background: #6366f1;
      color: white;
    }
    /* 顶部导航返回 */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <!-- 页面1：首页 -->
  <div class="page active" id="page-home">
    <h1>数字猜猜乐</h1>
    <p class="desc">移动UI设计期末作业 · 移动端触摸小游戏<br>系统随机生成1-100数字，猜出即可获胜</p>
    <div class="card">
      <div class="data-row">
        <span>游戏规则</span>
      </div>
      <div class="data-row">
        <span>1. 点击开始游戏进入挑战</span>
      </div>
      <div class="data-row">
        <span>2. 输入1~100之间数字提交</span>
      </div>
      <div class="data-row">
        <span>3. 提示数字偏大/偏小</span>
      </div>
      <div class="data-row">
        <span>4. 最少次数通关获得高分</span>
      </div>
      <button class="btn btn-primary" id="startBtn">开始游戏</button>
    </div>
  </div>

  <!-- 页面2：游戏页 -->
  <div class="page" id="page-game">
    <button class="back-btn" id="backHome">←</button>
    <h1>猜数字挑战</h1>
    <p class="desc">请输入1~100的整数</p>
    <div class="card">
      <input type="number" id="numInput" placeholder="输入你猜的数字" min="1" max="100">
      <div class="tip-box" id="tipText">准备开始...</div>
      <button class="btn btn-primary" id="submitBtn">提交答案</button>
      <button class="btn btn-outline" id="resetGame">重新开局</button>
      <div class="data-row">
        <span>已猜次数</span>
        <span id="countText">0</span>
      </div>
    </div>
  </div>

  <!-- 结算弹窗 -->
  <div class="modal" id="resultModal">
    <div class="modal-content">
      <h2>恭喜通关！</h2>
      <p id="resultMsg">你一共猜了 X 次</p>
      <button class="btn modal-btn" id="restartBtn">再来一局</button>
      <button class="btn btn-outline" id="homeBtn">返回首页</button>
    </div>
  </div>

  <script>
    // DOM元素
    const pageHome = document.getElementById('page-home');
    const pageGame = document.getElementById('page-game');
    const startBtn = document.getElementById('startBtn');
    const backHome = document.getElementById('backHome');
    const numInput = document.getElementById('numInput');
    const submitBtn = document.getElementById('submitBtn');
    const resetGame = document.getElementById('resetGame');
    const tipText = document.getElementById('tipText');
    const countText = document.getElementById('countText');
    const resultModal = document.getElementById('resultModal');
    const resultMsg = document.getElementById('resultMsg');
    const restartBtn = document.getElementById('restartBtn');
    const homeBtn = document.getElementById('homeBtn');

    // 游戏全局变量
    let targetNum = 0;
    let guessCount = 0;

    // 初始化随机数字
    function initGame() {
      targetNum = Math.floor(Math.random() * 100) + 1;
      guessCount = 0;
      countText.textContent = guessCount;
      tipText.textContent = "请输入数字提交";
      numInput.value = "";
      resultModal.classList.remove('show');
    }

    // 切换页面
    function switchPage(showPage) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      showPage.classList.add('active');
    }

    // 首页进入游戏
    startBtn.addEventListener('click', () => {
      initGame();
      switchPage(pageGame);
    })

    // 返回首页
    backHome.addEventListener('click', () => {
      switchPage(pageHome);
    })

    // 重新开局
    resetGame.addEventListener('click', initGame);

    // 提交猜测
    submitBtn.addEventListener('click', () => {
      const val = Number(numInput.value);
      if(isNaN(val) || val < 1 || val > 100) {
        tipText.textContent = "请输入1-100有效数字！";
        return;
      }
      guessCount++;
      countText.textContent = guessCount;

      if(val > targetNum) {
        tipText.textContent = "太大了，往小一点猜";
      } else if(val < targetNum) {
        tipText.textContent = "太小了，往大一点猜";
      } else {
        // 猜对弹出结算弹窗
        resultMsg.textContent = `你只用了 ${guessCount} 次就猜对啦！目标数字是${targetNum}`;
        resultModal.classList.add('show');
      }
    })

    // 弹窗按钮
    restartBtn.addEventListener('click', initGame);
    homeBtn.addEventListener('click', () => {
      resultModal.classList.remove('show');
      switchPage(pageHome);
    })

    // 页面加载初始化
    initGame();
  </script>
</body>
</html>
